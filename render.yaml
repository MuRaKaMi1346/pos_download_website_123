# Render Blueprint — SmartBrew landing backend (FastAPI).
# The frontend stays on Vercel; this provisions the API + a Postgres database.
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: smartbrew-landing-db
    plan: free
    databaseName: smartbrew_landing
    user: smartbrew

services:
  - type: web
    name: smartbrew-landing-api
    runtime: python
    plan: free
    rootDir: landing-backend
    # uv is not preinstalled on Render's native Python runtime, so install it first.
    buildCommand: pip install uv && uv sync --no-dev
    # Tables are created on startup via SQLModel.metadata.create_all (app/db/session.py),
    # so no Alembic step is needed for a fresh database.
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: smartbrew-landing-db
          property: connectionString
      # Strong random values, generated once by Render and kept stable across deploys.
      - key: SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      # Must include your Vercel frontend origin (comma-separated). Set at create time.
      - key: CORS_ORIGINS
        sync: false
