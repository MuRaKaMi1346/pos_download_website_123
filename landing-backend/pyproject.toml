[project]
name = "smartbrew-landing-backend"
version = "1.0.0"
description = "SmartBrew POS landing site backend — release manifest, contact, newsletter."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "sqlmodel>=0.0.16",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "alembic>=1.13",
    "slowapi>=0.1.9",
    "pyyaml>=6.0",
    "packaging>=24.0",
    "email-validator>=2.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
    "ruff>=0.4",
    "mypy>=1.9",
    "types-pyyaml>=6.0",
]

# This is an application, not a library — do not build/install the project itself.
[tool.uv]
package = false

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
# Alembic scaffolding + autogenerated migrations are framework-managed.
extend-exclude = ["alembic"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "C4", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]
